<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="toasts" class="toast-container">
      <div class="toast toast-success" th:if="${success}">
        <span class="toast-icon">✓</span>
        <span th:text="${success}">Success message</span>
      </div>

      <div class="toast toast-error" th:if="${error}">
        <span class="toast-icon">!</span>
        <span th:text="${error}">Error message</span>
      </div>

      <div class="toast toast-error" th:if="${param.error}">
        <span class="toast-icon">!</span>
        <span>Invalid username or password</span>
      </div>

      <div class="toast toast-success" th:if="${param.logout}">
        <span class="toast-icon">✓</span>
        <span>You have been logged out</span>
      </div>

      <script>
        setTimeout(() => {
          document.querySelectorAll(".toast").forEach((toast) => {
            toast.classList.add("toast-hide");
            toast.addEventListener("animationend", () => toast.remove());
          });
        }, 3200);
      </script>
    </div>
  </body>
</html>

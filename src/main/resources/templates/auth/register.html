<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CaseCraft</title>
    <link
      rel="icon"
      type="image/svg+xml"
      th:href="@{/images/casecraft-icon.svg}"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/navbar :: publicNavbar}"></div>
    <div th:replace="~{fragments/toasts :: toasts}"></div>

    <div class="card">
      <h2>Create account</h2>
      <p class="muted">Set up your Traineeship account in a few seconds.</p>

      <form th:action="@{/register}" method="post">
        <label
          >Username
          <input
            type="text"
            name="username"
            placeholder="choose a username"
            required
          />
        </label>
        <label
          >Email
          <input type="email" name="email" placeholder="you@example.com" />
        </label>
        <label
          >Password
          <input
            type="password"
            name="password"
            placeholder="••••••••"
            required
          />
        </label>
        <button type="submit">Register</button>
      </form>

      <div class="toolbar">
        <a th:href="@{/login}">Already have an account? Login</a>
      </div>
    </div>
    <div th:replace="~{fragments/footer :: appFooter}"></div>
  </body>
</html>

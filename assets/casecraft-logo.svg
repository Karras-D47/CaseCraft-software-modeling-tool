    <rect width="64" height="64" rx="14" fill="#8A3940"/>
    <rect x="14" y="15" width="16" height="12" rx="3" fill="#FFFFFF"/>
    <rect x="34" y="15" width="16" height="12" rx="3" fill="#FFFFFF"/>

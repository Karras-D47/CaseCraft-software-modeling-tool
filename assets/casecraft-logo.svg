  </defs>

  <!-- card -->
  <rect x="10" y="10" width="880" height="240" rx="34" fill="url(#card)"/>
  <rect x="10.75" y="10.75" width="878.5" height="238.5" rx="33.25" fill="none" stroke="#ECD9DB" stroke-width="1.5"/>

  <!-- ===== Icon (user's mark, scaled) ===== -->
